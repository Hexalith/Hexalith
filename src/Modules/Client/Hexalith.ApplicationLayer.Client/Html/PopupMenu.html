<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
	<style>
		.dropdown-menu {
			position: relative;
			display: inline-block;
		}

		.dropdown-menu-content {
			display: none;
			position: absolute;
		}

		.dropdown-menu:hover .dropdown-menu-content {
			display: block;
		}
	</style>
	<fast-design-system-provider use-defaults>
		<div class="dropdown-menu">
			<fast-anchor id="test-button" class="dropdown-menu-button">T</fast-anchor>
			<div class="dropdown-menu-content">
				<fast-listbox aria-labelledby="test-button" id="test-listbox" name="test">
					<fast-option id="test-option-1" value="1">Value 1</fast-option>
					<fast-option id="test-option-2" value="2">Value 2</fast-option>
					<fast-option id="test-option-3" value="3">Value 3</fast-option>
					<fast-option id="test-option-4" value="4">Value 4</fast-option>
					<fast-option id="test-option-5" value="5">Value 5</fast-option>
				</fast-listbox>
			</div>
		</div>
	</fast-design-system-provider>
	<script type="module" src="https://unpkg.com/@microsoft/fast-components"></script>
</body>
</html>
