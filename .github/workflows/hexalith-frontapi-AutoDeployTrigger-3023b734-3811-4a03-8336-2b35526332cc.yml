name: Trigger auto deployment for hexalith-frontapi

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/hexalith-frontapi-AutoDeployTrigger-3023b734-3811-4a03-8336-2b35526332cc.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.HEXALITHFRONTAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.HEXALITHFRONTAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.HEXALITHFRONTAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/src/Servers/Hexalith.Server.FrontApi
          registryUrl: fiveforty.azurecr.io
          registryUsername: ${{ secrets.HEXALITHFRONTAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.HEXALITHFRONTAPI_REGISTRY_PASSWORD }}
          containerAppName: hexalith-frontapi
          resourceGroup: ffy-dev
          imageToBuild: fiveforty.azurecr.io/hexalith-frontapi:${{ github.sha }}
          


