name: Release - CI
on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'docs/**/*'
    tags: 
      - 'v*.*.*'
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  publish:
    runs-on: ubuntu-latest
    name: Build, Test, Publish
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Setup .NET 7.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 7.0.x
    - name: Build Version
      run: |
        dotnet tool install --global minver-cli --version 4.3.0
        version=$(minver -t v -v e -d preview)
        echo "MINVERVERSIONOVERRIDE=$version" >> $GITHUB_ENV
        echo "VERSION=$version" >> $GITHUB_ENV
        echo "VERSION=$version"
    - name: Build
      run: |
        dotnet build --configuration Release -p:Version=${{ env.VERSION }}
    - name: Unit Tests
      run: |
        dotnet test -c Release --no-restore --no-build ./test/Hexalith.UnitTests/Hexalith.UnitTests.csproj 
    - name: Deploy release nuget packages
      run: |
        dotnet nuget push './src/Core/**/*.nupkg' --api-key ${{secrets.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.HEXALITHDYNAMICS365FINANCE_AZURE_CREDENTIALS }}
    - name: Build and push Dynamics365Finance container image to registry
      uses: azure/container-apps-deploy-action@v1
      with:
        appSourcePath: ${{ github.workspace }}/src/Servers/Hexalith.Server.Dynamics365Finance 
        registryUrl: christofle.azurecr.io
        registryUsername: ${{ secrets.HEXALITHDYNAMICS365FINANCE_REGISTRY_USERNAME }}
        registryPassword: ${{ secrets.HEXALITHDYNAMICS365FINANCE_REGISTRY_PASSWORD }}
        containerAppName: hexalith-dynamics365finance
        resourceGroup: chr-dev-logistics-partner
        imageToBuild: christofle.azurecr.io/hexalith-dynamics365finance:${{ env.VERSION }}